<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#E8F5E9"/>
  <g transform="translate(100,95)">
    <!-- body -->
    <ellipse cx="0" cy="10" rx="22" ry="28" fill="#66BB6A"/>
    <!-- head -->
    <circle cx="0" cy="-22" r="20" fill="#81C784"/>
    <!-- beak -->
    <polygon points="-4,-18 4,-18 0,-10" fill="#FFA726"/>
    <!-- eyes -->
    <circle cx="-8" cy="-28" r="5" fill="#fff"/>
    <circle cx="8" cy="-28" r="5" fill="#fff"/>
    <circle cx="-7" cy="-28" r="2.5" fill="#212121"/>
    <circle cx="9" cy="-28" r="2.5" fill="#212121"/>
    <!-- crest -->
    <circle cx="-6" cy="-42" r="4" fill="#43A047"/>
    <circle cx="0" cy="-44" r="4" fill="#2E7D32"/>
    <circle cx="6" cy="-42" r="4" fill="#43A047"/>
    <!-- wing left -->
    <ellipse cx="-24" cy="6" rx="12" ry="18" fill="#43A047" transform="rotate(10,-24,6)"/>
    <!-- wing right -->
    <ellipse cx="24" cy="6" rx="12" ry="18" fill="#43A047" transform="rotate(-10,24,6)"/>
    <!-- feet -->
    <path d="M-10,38 L-16,46 M-10,38 L-10,46 M-10,38 L-4,46" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M10,38 L4,46 M10,38 L10,46 M10,38 L16,46" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- tail -->
    <ellipse cx="0" cy="38" rx="10" ry="6" fill="#43A047"/>
  </g>
</svg>
