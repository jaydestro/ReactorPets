<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#EFEBE9"/>
  <g transform="translate(100,100)">
    <!-- shell -->
    <ellipse cx="0" cy="6" rx="38" ry="26" fill="#8D6E63"/>
    <ellipse cx="0" cy="2" rx="36" ry="22" fill="#A1887F"/>
    <!-- shell pattern -->
    <path d="M0,-18 L-8,0 L0,18" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <path d="M0,-18 L8,0 L0,18" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <path d="M-18,-10 L0,0 L-18,14" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <path d="M18,-10 L0,0 L18,14" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <!-- head -->
    <ellipse cx="-36" cy="10" rx="14" ry="12" fill="#66BB6A"/>
    <!-- eye -->
    <circle cx="-40" cy="6" r="3" fill="#212121"/>
    <circle cx="-39" cy="5" r="1.2" fill="#fff"/>
    <!-- mouth -->
    <path d="M-46,14 Q-40,18 -34,14" fill="none" stroke="#388E3C" stroke-width="1.5"/>
    <!-- legs -->
    <ellipse cx="-24" cy="28" rx="8" ry="5" fill="#66BB6A"/>
    <ellipse cx="20" cy="28" rx="8" ry="5" fill="#66BB6A"/>
    <ellipse cx="-26" cy="24" rx="4" ry="6" fill="#66BB6A"/>
    <ellipse cx="22" cy="24" rx="4" ry="6" fill="#66BB6A"/>
    <!-- tail -->
    <circle cx="36" cy="18" r="4" fill="#66BB6A"/>
  </g>
</svg>
