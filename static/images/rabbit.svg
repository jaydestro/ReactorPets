<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#FFF8E1"/>
  <g transform="translate(100,90)">
    <!-- body -->
    <ellipse cx="0" cy="24" rx="30" ry="28" fill="#EEEEEE"/>
    <!-- head -->
    <ellipse cx="0" cy="-12" rx="26" ry="24" fill="#F5F5F5"/>
    <!-- ears -->
    <ellipse cx="-16" cy="-40" rx="10" ry="22" fill="#F5F5F5"/>
    <ellipse cx="16" cy="-40" rx="10" ry="22" fill="#F5F5F5"/>
    <ellipse cx="-16" cy="-40" rx="5" ry="16" fill="#F8BBD0"/>
    <ellipse cx="16" cy="-40" rx="5" ry="16" fill="#F8BBD0"/>
    <!-- eyes -->
    <circle cx="-10" cy="-14" r="5" fill="#F48FB1"/>
    <circle cx="10" cy="-14" r="5" fill="#F48FB1"/>
    <circle cx="-10" cy="-14" r="3" fill="#C2185B"/>
    <circle cx="10" cy="-14" r="3" fill="#C2185B"/>
    <circle cx="-9" cy="-15" r="1.5" fill="#fff"/>
    <circle cx="11" cy="-15" r="1.5" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="0" cy="-4" rx="4" ry="3" fill="#F48FB1"/>
    <!-- mouth -->
    <path d="M-3,0 Q0,4 3,0" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>
    <!-- whiskers -->
    <line x1="-14" y1="-2" x2="-32" y2="-6" stroke="#BDBDBD" stroke-width="1"/>
    <line x1="-14" y1="1" x2="-32" y2="3" stroke="#BDBDBD" stroke-width="1"/>
    <line x1="14" y1="-2" x2="32" y2="-6" stroke="#BDBDBD" stroke-width="1"/>
    <line x1="14" y1="1" x2="32" y2="3" stroke="#BDBDBD" stroke-width="1"/>
    <!-- paws -->
    <ellipse cx="-14" cy="50" rx="10" ry="6" fill="#E0E0E0"/>
    <ellipse cx="14" cy="50" rx="10" ry="6" fill="#E0E0E0"/>
    <!-- tail -->
    <circle cx="26" cy="40" r="10" fill="#F5F5F5"/>
  </g>
</svg>
