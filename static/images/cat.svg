<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#F3E5F5"/>
  <g transform="translate(100,90)">
    <!-- head -->
    <ellipse cx="0" cy="-10" rx="34" ry="30" fill="#9E9E9E"/>
    <!-- ears -->
    <polygon points="-28,-34 -18,-58 -8,-30" fill="#757575"/>
    <polygon points="28,-34 18,-58 8,-30" fill="#757575"/>
    <polygon points="-24,-36 -18,-52 -12,-33" fill="#F8BBD0"/>
    <polygon points="24,-36 18,-52 12,-33" fill="#F8BBD0"/>
    <!-- eyes -->
    <ellipse cx="-12" cy="-12" rx="6" ry="7" fill="#FFF9C4"/>
    <ellipse cx="12" cy="-12" rx="6" ry="7" fill="#FFF9C4"/>
    <ellipse cx="-12" cy="-11" rx="3" ry="4" fill="#212121"/>
    <ellipse cx="12" cy="-11" rx="3" ry="4" fill="#212121"/>
    <!-- nose -->
    <polygon points="0,-2 -4,3 4,3" fill="#F48FB1"/>
    <!-- whiskers -->
    <line x1="-16" y1="2" x2="-38" y2="-2" stroke="#BDBDBD" stroke-width="1.5"/>
    <line x1="-16" y1="5" x2="-38" y2="7" stroke="#BDBDBD" stroke-width="1.5"/>
    <line x1="16" y1="2" x2="38" y2="-2" stroke="#BDBDBD" stroke-width="1.5"/>
    <line x1="16" y1="5" x2="38" y2="7" stroke="#BDBDBD" stroke-width="1.5"/>
    <!-- mouth -->
    <path d="M-4,6 Q0,10 4,6" fill="none" stroke="#757575" stroke-width="1.5"/>
    <!-- body -->
    <ellipse cx="0" cy="44" rx="26" ry="22" fill="#9E9E9E"/>
    <!-- paws -->
    <ellipse cx="-14" cy="64" rx="8" ry="5" fill="#757575"/>
    <ellipse cx="14" cy="64" rx="8" ry="5" fill="#757575"/>
    <!-- tail -->
    <path d="M24,36 Q50,18 56,42 Q58,54 48,48" fill="none" stroke="#757575" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
