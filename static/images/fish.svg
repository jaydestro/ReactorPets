<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#E3F2FD"/>
  <g transform="translate(100,100)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="40" ry="28" fill="#FF9800"/>
    <!-- tail fin -->
    <path d="M36,-8 Q56,-20 50,0 Q56,20 36,8" fill="#F57C00"/>
    <!-- dorsal fin -->
    <path d="M-10,-28 Q0,-44 10,-28" fill="#F57C00"/>
    <!-- pectoral fin -->
    <path d="M-8,12 Q-20,24 -4,20" fill="#F57C00"/>
    <!-- stripes -->
    <path d="M-10,-24 Q-12,0 -10,24" fill="none" stroke="#fff" stroke-width="4" opacity="0.7"/>
    <path d="M6,-26 Q4,0 6,26" fill="none" stroke="#fff" stroke-width="4" opacity="0.7"/>
    <path d="M22,-22 Q20,0 22,22" fill="none" stroke="#fff" stroke-width="4" opacity="0.7"/>
    <!-- eye -->
    <circle cx="-20" cy="-4" r="6" fill="#fff"/>
    <circle cx="-19" cy="-4" r="3.5" fill="#212121"/>
    <circle cx="-18" cy="-5" r="1.5" fill="#fff"/>
    <!-- mouth -->
    <path d="M-32,4 Q-28,8 -24,4" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <!-- bubbles -->
    <circle cx="-40" cy="-20" r="3" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
    <circle cx="-46" cy="-32" r="4" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
    <circle cx="-38" cy="-42" r="2.5" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
  </g>
</svg>
