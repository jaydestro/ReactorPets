{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 style="margin-bottom:1rem;">{{ action }} Pet</h2>
  <form method="POST">
    <div class="form-group">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" value="{{ pet.get('name', '') }}" required>
    </div>
    <div class="form-group">
      <label for="species">Species *</label>
      <input type="text" id="species" name="species" value="{{ pet.get('species', '') }}" required>
    </div>
    <div class="form-group">
      <label for="breed">Breed</label>
      <input type="text" id="breed" name="breed" value="{{ pet.get('breed', '') }}">
    </div>
    <div class="form-group">
      <label for="age">Age</label>
      <input type="text" id="age" name="age" value="{{ pet.get('age', '') }}">
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary">{{ action }}</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
