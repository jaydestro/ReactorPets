{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:600px;margin:0 auto">
  <div class="card-body">
    <h2 style="margin-bottom:0.5rem">🐾 Adopt {{ pet.name }}</h2>
    <p style="color:#666;margin-bottom:1.5rem">{{ pet.species }} · {{ pet.breed }} · {{ pet.age }}</p>
    <form method="POST">
      <div class="form-group">
        <label for="full_name">Full Name *</label>
        <input type="text" id="full_name" name="full_name"
               value="{{ current_user.full_name }}" required>
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email"
               value="{{ current_user.email }}" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone"
               value="{{ current_user.phone }}">
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address"
               value="{{ current_user.address }}">
      </div>
      <div class="form-group">
        <label for="reason">Why do you want to adopt {{ pet.name }}?</label>
        <textarea id="reason" name="reason" placeholder="Tell us about yourself and your home…"></textarea>
      </div>
      <div class="form-group">
        <label for="experience">Pet experience</label>
        <textarea id="experience" name="experience" placeholder="Have you had pets before?"></textarea>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-success">Submit Application</button>
        <a href="/pets/{{ pet.id }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
