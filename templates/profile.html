{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2 style="margin-bottom:1.5rem">👤 My Profile</h2>
  <form method="POST">
    <div class="form-group">
      <label for="full_name">Full Name</label>
      <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name }}">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ current_user.email }}">
    </div>
    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" value="{{ current_user.phone }}">
    </div>
    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" name="address" value="{{ current_user.address }}">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Save Profile</button>
  </form>
  <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:#888">
    Profile info will auto-fill adoption forms.
  </p>
</div>
{% endblock %}
